services:
  - type: web
    name: xlb-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # set in Render dashboard, do not commit
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_ROAST_MODEL
        value: gpt-4o-mini
      - key: DB_URL
        value: sqlite:///./quant.db
      - key: DATA_CACHE_DIR
        value: ./data_cache
      - key: CORS_ORIGINS
        sync: false        # set to your Vercel URL, e.g. https://xiao-long-bao.vercel.app
